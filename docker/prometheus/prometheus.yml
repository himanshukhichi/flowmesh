global:
  scrape_interval: 10s

scrape_configs:
  - job_name: flowmesh-host
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
  - job_name: flowmesh-compose
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - scheduler:8080
          - scheduler-standby-1:8080
          - scheduler-standby-2:8080
          - worker-1:8080
          - worker-2:8080
          - worker-3:8080
          - worker-4:8080
          - worker-5:8080
