x-flowmesh-env: &flowmesh-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flowmesh
  SPRING_DATASOURCE_USERNAME: flowmesh
  SPRING_DATASOURCE_PASSWORD: flowmesh
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: 6379
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SPRING_KAFKA_ADMIN_AUTO_CREATE: "true"
  GRPC_SERVER_PORT: 9091
  FLOWMESH_DLQ_CONSUMER_ENABLED: "true"
  FLOWMESH_RETRY_CONSUMER_ENABLED: "true"
  FLOWMESH_OBSERVABILITY_KAFKA_DEPTH_ENABLED: "true"

x-flowmesh-app: &flowmesh-app
  build: .
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowmesh
      POSTGRES_USER: flowmesh
      POSTGRES_PASSWORD: flowmesh
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowmesh -d flowmesh"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/bitnami/kafka

  prometheus:
    image: prom/prometheus:v2.53.1
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  scheduler:
    <<: *flowmesh-app
    environment:
      <<: *flowmesh-env
      FLOWMESH_SCHEDULER_ENABLED: "true"
      FLOWMESH_WORKER_ENABLED: "false"
    ports:
      - "8080:8080"
      - "9091:9091"

  scheduler-standby-1:
    <<: *flowmesh-app
    environment:
      <<: *flowmesh-env
      FLOWMESH_SCHEDULER_ENABLED: "true"
      FLOWMESH_WORKER_ENABLED: "false"

  scheduler-standby-2:
    <<: *flowmesh-app
    environment:
      <<: *flowmesh-env
      FLOWMESH_SCHEDULER_ENABLED: "true"
      FLOWMESH_WORKER_ENABLED: "false"

  worker-1: &worker
    <<: *flowmesh-app
    environment:
      <<: *flowmesh-env
      FLOWMESH_SCHEDULER_ENABLED: "false"
      FLOWMESH_WORKER_ENABLED: "true"
      FLOWMESH_WORKER_WORKER_ID: worker-1
      FLOWMESH_WORKER_SCHEDULER_GRPC_HOST: scheduler
      FLOWMESH_WORKER_SCHEDULER_GRPC_PORT: 9091

  worker-2:
    <<: *worker
    environment:
      <<: *flowmesh-env
      FLOWMESH_SCHEDULER_ENABLED: "false"
      FLOWMESH_WORKER_ENABLED: "true"
      FLOWMESH_WORKER_WORKER_ID: worker-2
      FLOWMESH_WORKER_SCHEDULER_GRPC_HOST: scheduler
      FLOWMESH_WORKER_SCHEDULER_GRPC_PORT: 9091

  worker-3:
    <<: *worker
    environment:
      <<: *flowmesh-env
      FLOWMESH_SCHEDULER_ENABLED: "false"
      FLOWMESH_WORKER_ENABLED: "true"
      FLOWMESH_WORKER_WORKER_ID: worker-3
      FLOWMESH_WORKER_SCHEDULER_GRPC_HOST: scheduler
      FLOWMESH_WORKER_SCHEDULER_GRPC_PORT: 9091

  worker-4:
    <<: *worker
    environment:
      <<: *flowmesh-env
      FLOWMESH_SCHEDULER_ENABLED: "false"
      FLOWMESH_WORKER_ENABLED: "true"
      FLOWMESH_WORKER_WORKER_ID: worker-4
      FLOWMESH_WORKER_SCHEDULER_GRPC_HOST: scheduler
      FLOWMESH_WORKER_SCHEDULER_GRPC_PORT: 9091

  worker-5:
    <<: *worker
    environment:
      <<: *flowmesh-env
      FLOWMESH_SCHEDULER_ENABLED: "false"
      FLOWMESH_WORKER_ENABLED: "true"
      FLOWMESH_WORKER_WORKER_ID: worker-5
      FLOWMESH_WORKER_SCHEDULER_GRPC_HOST: scheduler
      FLOWMESH_WORKER_SCHEDULER_GRPC_PORT: 9091

volumes:
  postgres-data:
  kafka-data:
