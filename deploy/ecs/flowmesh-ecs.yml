AWSTemplateFormatVersion: "2010-09-09"
Description: FlowMesh ECS Fargate services for scheduler and workers.

Parameters:
  ClusterName:
    Type: String
    Default: flowmesh
  ImageUri:
    Type: String
    Description: ECR image URI for FlowMesh.
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
  PostgresJdbcUrl:
    Type: String
    NoEcho: true
  PostgresUsername:
    Type: String
    NoEcho: true
  PostgresPassword:
    Type: String
    NoEcho: true
  RedisHost:
    Type: String
  KafkaBootstrapServers:
    Type: String
  SchedulerDesiredCount:
    Type: Number
    Default: 3
  WorkerDesiredCount:
    Type: Number
    Default: 5
  SchedulerGrpcHost:
    Type: String
    Description: Internal DNS name or load balancer host that routes to scheduler gRPC port 9091.

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ClusterName

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/flowmesh
      RetentionInDays: 14

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  SchedulerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: flowmesh-scheduler
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: "1024"
      Memory: "2048"
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: scheduler
          Image: !Ref ImageUri
          PortMappings:
            - ContainerPort: 8080
            - ContainerPort: 9091
          Environment: &CommonEnvironment
            - Name: SPRING_DATASOURCE_URL
              Value: !Ref PostgresJdbcUrl
            - Name: SPRING_DATASOURCE_USERNAME
              Value: !Ref PostgresUsername
            - Name: SPRING_DATASOURCE_PASSWORD
              Value: !Ref PostgresPassword
            - Name: SPRING_DATA_REDIS_HOST
              Value: !Ref RedisHost
            - Name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              Value: !Ref KafkaBootstrapServers
            - Name: FLOWMESH_SCHEDULER_ENABLED
              Value: "true"
            - Name: FLOWMESH_WORKER_ENABLED
              Value: "false"
            - Name: FLOWMESH_DLQ_CONSUMER_ENABLED
              Value: "true"
            - Name: FLOWMESH_RETRY_CONSUMER_ENABLED
              Value: "true"
            - Name: FLOWMESH_OBSERVABILITY_KAFKA_DEPTH_ENABLED
              Value: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: scheduler

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: flowmesh-worker
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: "1024"
      Memory: "2048"
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Ref ImageUri
          Environment:
            - Name: SPRING_DATASOURCE_URL
              Value: !Ref PostgresJdbcUrl
            - Name: SPRING_DATASOURCE_USERNAME
              Value: !Ref PostgresUsername
            - Name: SPRING_DATASOURCE_PASSWORD
              Value: !Ref PostgresPassword
            - Name: SPRING_DATA_REDIS_HOST
              Value: !Ref RedisHost
            - Name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              Value: !Ref KafkaBootstrapServers
            - Name: FLOWMESH_SCHEDULER_ENABLED
              Value: "false"
            - Name: FLOWMESH_WORKER_ENABLED
              Value: "true"
            - Name: FLOWMESH_WORKER_SCHEDULER_GRPC_HOST
              Value: !Ref SchedulerGrpcHost
            - Name: FLOWMESH_WORKER_SCHEDULER_GRPC_PORT
              Value: "9091"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: worker

  SchedulerService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      DesiredCount: !Ref SchedulerDesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref SchedulerTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref SubnetIds
          SecurityGroups: !Ref SecurityGroupIds
  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      DesiredCount: !Ref WorkerDesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref WorkerTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref SubnetIds
          SecurityGroups: !Ref SecurityGroupIds

Outputs:
  Cluster:
    Value: !Ref Cluster
  SchedulerTaskDefinition:
    Value: !Ref SchedulerTaskDefinition
  WorkerTaskDefinition:
    Value: !Ref WorkerTaskDefinition
